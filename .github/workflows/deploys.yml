name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential gfortran liblapack-dev liblapacke-dev libopenmpi-dev

      - name: Build C++ libraries
        run: |
          mkdir -p build
          cd build
          cmake .. -DCXX=g++ -DFC=gfortran -DPYTHON_EXECUTABLE=$(which python)
          make install -j4
          cd ..
          rm -rf build

      - name: Install Python package
        run: pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

  deploy-docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install doc tools
        run: pip install sphinx myst-parser sphinx_rtd_theme

      - name: Build docs (Sphinx)
        run: sphinx-build -b html misc/source docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
